services:
  db:
    image: postgres:16
    container_name: hardware-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: hardware_erp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432 so it does NOT clash with a locally
      # installed Postgres on 5432. Connect pgAdmin 4 to localhost:5433.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d hardware_erp"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: hardware-erp-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://erp:erp@db:5432/hardware_erp
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_NAME: ${APP_NAME:-Hardware ERP}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
